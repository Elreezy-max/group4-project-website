<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduBalance - Support</title>
    <link rel="stylesheet" href="../css/styles.css">
</head>
<body>
    <div class="page-wrapper">
        <header>
            <div class="logo-container">
                <h2>EduBalance</h2>
            </div>
            <nav aria-label="Main Navigation">
                <ul>
                    <li><a href="../index.html">Back to Dashboard</a></li>
                </ul>
            </nav>
        </header>
        <main class="support-container" style="padding: 2rem; text-align: center;">
            <h1>Contact Support</h1>
            <p>Need help with EduBalance? Send us a message!</p>
            <form style="max-width: 400px; margin: 0 auto; display: flex; flex-direction: column; gap: 1rem;">
                <input type="text" placeholder="Your Name" required style="padding: 0.5rem;">
                <input type="email" placeholder="Your Student Email" required style="padding: 0.5rem;">
                <textarea placeholder="How can we help?" rows="5" required style="padding: 0.5rem;"></textarea>
                <button type="submit" style="padding: 0.5rem; background: #007bff; color: white; border: none; cursor: pointer;">Send Message</button>
            </form>
        </main>
        <!-- Footer -->
        <footer class="footer">
            <div class="footer-links">
                <a href="support.html">Support</a> |
                <a href="https://github.com/Elreezy-max/group4-project-website">GitHub</a>
            </div>
            <p class="footer-text">&copy; 2026 EduBalance Platform</p>
        </footer>
    </div>
</body>
</html>
